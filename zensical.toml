[project]
site_name = "bubble-agent"
site_description = "Run your coding agent in a bubble."
site_url = "https://ak1ra-lab.github.io/bubble-agent/"
site_author = "ak1ra"
copyright = "Copyright (c) 2026 ak1ra"
repo_url = "https://github.com/ak1ra-lab/bubble-agent"
repo_name = "ak1ra-lab/bubble-agent"
docs_dir = "docs"
site_dir = "site"
dev_addr = "0.0.0.0:8000"
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "API" = "api.md" },
]

[project.theme]
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
