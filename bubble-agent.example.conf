# bubble-agent configuration file
# Format: type:source:destination
#
# Available types:
#   bind           - Read-write bind (source must exist)
#   ro-bind        - Read-only bind (source must exist)
#   bind-try       - Read-write bind (ignored if source doesn't exist)
#   ro-bind-try    - Read-only bind (ignored if source doesn't exist)
#   symlink        - Create symbolic link
#   env / setenv   - Set environment variable (Format: env:VAR_NAME:VAR_VALUE)
#   workspace      - Parse a .code-workspace file and create virtual workspace
#   workspace-path - Override the virtual workspace directory
#
# Both source and destination support ~ for $HOME and env vars ($VAR, ${VAR}).
#
# Note: --clearenv is applied, so API keys (OPENAI_API_KEY, etc.)
# must be configured in the agent's config files, not env vars.

# ---- Toolchains ----

# Node.js
bind:~/.bun:~/.bun
# bind:~/.npm:~/.npm
# bind:~/.pnpm-store:~/.pnpm-store
# bind:~/.local/share/fnm:~/.local/share/fnm

# Rust
bind:~/.cargo:~/.cargo
bind:~/.rustup:~/.rustup

# Go
bind:~/.go:~/.go
bind:~/.local/share/go:~/.local/share/go

# Java / Maven
# bind:~/.m2:~/.m2

# Python
bind:~/.local/bin:~/.local/bin
bind:~/.local/share/uv:~/.local/share/uv

# ---- Configuration & Credentials ----

bind:~/.gitconfig:~/.gitconfig
bind:~/.config/git:~/.config/git

# ---- Caches ----

bind:~/.cache/fontconfig:~/.cache/fontconfig

# ---- OpenCode (default agent) ----

# OpenCode data directories (required for opencode)
bind:~/.config/opencode:~/.config/opencode
bind:~/.cache/opencode:~/.cache/opencode
bind:~/.local/share/opencode:~/.local/share/opencode
bind:~/.local/state/opencode:~/.local/state/opencode

# OpenCode binary directory via https://opencode.ai/install
# bind:~/.opencode:~/.opencode

# LLM Agents skills
ro-bind:~/.agents:~/.agents

# ---- Environment Variables ----

# env:VAR_NAME:VAR_VALUE
#
# Examples for Google Cloud Agent Platform:
# (Also requires mapping the credentials file via ro-bind)
#
# env:GOOGLE_VERTEX_LOCATION:${GOOGLE_VERTEX_LOCATION}
# env:GOOGLE_CLOUD_PROJECT:${GOOGLE_CLOUD_PROJECT}
# env:GOOGLE_APPLICATION_CREDENTIALS:${GOOGLE_APPLICATION_CREDENTIALS}
# ro-bind-try:${GOOGLE_APPLICATION_CREDENTIALS}:${GOOGLE_APPLICATION_CREDENTIALS}

# ---- Virtual Workspace (VS Code .code-workspace) ----

# Parse a .code-workspace JSON file and assemble a virtual workspace at
# ~/workspace (or the path set by workspace-path) using symlinks to each
# folder defined in the "folders" list.
#
# workspace:~/projects/my.code-workspace
#
# Custom workspace directory (default: ~/workspace):
# workspace-path:~/virtual-workspace
